name: NCS Main Closed Loop

on:
  push:
    branches: [main]
    paths:
      [
        "index.html",
        "js/**",
        "mcus/**",
        "ci/**",
        "package.json",
        "package-lock.json",
        ".github/workflows/zephyr-build.yml",
      ]
  pull_request:
    paths:
      [
        "index.html",
        "js/**",
        "mcus/**",
        "ci/**",
        "package.json",
        "package-lock.json",
        ".github/workflows/zephyr-build.yml",
      ]
  workflow_dispatch:

jobs:
  site-export:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Export all board archives from the site
        run: node ci/export-site-zips.js

      - uses: actions/upload-artifact@v4
        with:
          name: closed-loop-site-exports
          path: ci/output/closed-loop/

  ncs-build:
    needs: site-export
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.17.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: closed-loop-site-exports
          path: ci/output/closed-loop/

      - name: Install west
        run: |
          python3 -m venv .west-venv
          .west-venv/bin/pip install west
          echo "${{ github.workspace }}/.west-venv/bin" >> "$GITHUB_PATH"

      - name: Initialize nRF Connect SDK main
        run: |
          west init -m https://github.com/nrfconnect/sdk-nrf --mr main ncs-main
          cd ncs-main
          west update --narrow -o=--depth=1
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C /opt
          /opt/zephyr-sdk-0.17.0/setup.sh -t arm-zephyr-eabi -t riscv64-zephyr-elf -c

      - name: Build exported boards against NCS main
        run: node ci/build-exported-boards.js --workspace=${{ github.workspace }}/ncs-main
